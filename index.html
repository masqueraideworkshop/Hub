<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqueraide Workshop Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; }
        .bento-card { 
            background: #18181b; 
            border: 1px solid #27272a; 
            transition: all 0.3s ease;
        }
        .bento-card:hover { border-color: #dc2626; transform: translateY(-2px); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-xl mx-auto mb-10 text-center">
        <img src="Logopit_1610381027557.png" alt="Masqueraide Workshop" class="w-full max-w-[320px] mx-auto mb-2 object-contain">
        <p class="text-zinc-500 uppercase tracking-[0.3em] text-[10px] font-bold">The Central Hub</p>
    </header>

    <main class="max-w-md mx-auto space-y-4">
        
        <a href="https://youtube.com/@masqueraideworkshop?si=e95o00Aq6hJoAsij" target="_blank" class="bento-card p-6 rounded-2xl flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <span class="text-2xl text-red-600 font-bold">YT</span>
                <div>
                    <h2 class="font-bold text-lg leading-tight">YouTube Channel</h2>
                    <p class="text-zinc-500 text-xs">Technical Tutorials & Guides</p>
                </div>
            </div>
            <span class="text-zinc-600 group-hover:text-white transition">&rarr;</span>
        </a>

        <a href="https://www.tiktok.com/@masqueraide_workshop?_r=1&_t=ZT-95ftzPB1BVO" target="_blank" class="bento-card p-6 rounded-2xl flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <span class="text-2xl text-zinc-400 font-bold">TK</span>
                <div>
                    <h2 class="font-bold text-lg leading-tight">TikTok</h2>
                    <p class="text-zinc-500 text-xs">Short-form BTS Teasers</p>
                </div>
            </div>
            <span class="text-zinc-600 group-hover:text-white transition">&rarr;</span>
        </a>

        <a href="https://www.facebook.com/share/18P1kjpnZG/" target="_blank" class="bento-card p-6 rounded-2xl flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <span class="text-2xl text-blue-600 font-bold">FB</span>
                <div>
                    <h2 class="font-bold text-lg leading-tight">Facebook</h2>
                    <p class="text-zinc-500 text-xs">Community Updates</p>
                </div>
            </div>
            <span class="text-zinc-600 group-hover:text-white transition">&rarr;</span>
        </a>

    </main>

    <footer class="max-w-md mx-auto mt-16 pt-8 border-t border-zinc-900 text-center">
        <h3 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Inquiries</h3>
        <p class="text-sm font-medium text-zinc-300">Contact via Social Media</p>
        <p class="text-zinc-800 text-[9px] tracking-widest uppercase mt-12 italic">
            &copy; 2026 Masqueraide Workshop
        </p>
    </footer>

</body>
</html>
